name: publish

on:
  release:
    types: [published]
  workflow_dispatch:  # manual re-trigger without needing to delete/recreate a release

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write  # required for npm trusted publishing (OIDC) — no token stored anywhere
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest  # npm's OIDC trusted-publish PUT needs a recent CLI; the
                                         # Sigstore provenance step can succeed on an older one
                                         # while the actual registry auth still fails (this bug)
      - run: npm --version
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm publish --provenance --access public
